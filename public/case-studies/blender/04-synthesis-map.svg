weight="600" text-anchor="end" letter-spacing="2.6">02 / SYNTHESIS MAP</text><text x="1344" y="76" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace" font-size="10" fill="#EA7600" font-weight="500" text-anchor="end" letter-spacing="1">02 — 07</text><line x1="96" y1="84" x2="1344" y2="84" stroke="#202227" stroke-width="1" stroke-linecap="butt"/><line x1="96" y1="960" x2="1344" y2="960" stroke="#202227" stroke-width="1" stroke-linecap="butt"/><text x="96" y="980" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#666B73" font-weight="600" letter-spacing="2.6">ALEXANDRA SUGATAN</text><text x="264" y="980" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#3C414A" font-weight="600" letter-spacing="2.6">UX / UI RESEARCH · PRODUCT DESIGN</text><text x="1344" y="980" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace" font-size="10" fill="#3C414A" font-weight="400" text-anchor="end" letter-spacing="1">COGS 127 · THE FIRST HOUR</text></g><text x="96" y="150" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#EA7600" font-weight="700" letter-spacing="3">SYNTHESIS  ·  THE FIRST-HOUR DESCENT</text><text x="96" y="200" font-family="Newsreader, 'Times New Roman', Georgia, serif" font-size="43" fill="#F4F1E9"><tspan>The problem was not complexity.</tspan><tspan x="96" dy="49">It was </tspan><tspan font-style="italic" fill="#EA7600">unreadability.</tspan></text><text x="96" y="292" font-family="Newsreader, 'Times New Roman', Georgia, serif" font-size="14.5" fill="#CBC7BE"><tspan x="96" dy="0">Confidence plotted across the first hour. Every drop is a moment the interface failed</tspan><tspan x="96" dy="20">to say what was happening — not a moment Blender genuinely asked too much of a</tspan><tspan x="96" dy="20">beginner.</tspan></text><g id="plot_grid"><line x1="150" y1="380.0" x2="1220" y2="380.0" stroke="#141518" stroke-width="1" stroke-linecap="butt"/><line x1="150" y1="466.5" x2="1220" y2="466.5" stroke="#141518" stroke-width="1" stroke-linecap="butt"/><line x1="150" y1="553.0" x2="1220" y2="553.0" stroke="#141518" stroke-width="1" stroke-linecap="butt"/><line x1="150" y1="639.5" x2="1220" y2="639.5" stroke="#141518" stroke-width="1" stroke-linecap="butt"/><line x1="150" y1="726.0" x2="1220" y2="726.0" stroke="#141518" stroke-width="1" stroke-linecap="butt"/><line x1="150" y1="374" x2="150" y2="732" stroke="#2A2D33" stroke-width="1" stroke-linecap="butt"/><line x1="150" y1="726" x2="1310" y2="726" stroke="#2A2D33" stroke-width="1" stroke-linecap="butt"/></g><text x="118" y="553" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="2.5" fill="#90959C" transform="rotate(-90 118 553)" text-anchor="middle">FIRST-SESSION CONFIDENCE</text><text x="150" y="752" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace" font-size="9.5" fill="#666B73" letter-spacing="1">0 MIN</text><text x="1220" y="752" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace" font-size="9.5" fill="#666B73" text-anchor="end" letter-spacing="1">≈ 60 MIN</text><text x="685" y="752" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#90959C" font-weight="700" text-anchor="middle" letter-spacing="2.5">TIME IN FIRST HOUR  →</text><g id="phase_brackets"><line x1="126.0" y1="766" x2="174.0" y2="766" stroke="#3C414A" stroke-width="1" stroke-linecap="butt"/><line x1="126.0" y1="762" x2="126.0" y2="770" stroke="#3C414A" stroke-width="1" stroke-linecap="butt"/><line x1="174.0" y1="762" x2="174.0" y2="770" stroke="#3C414A" stroke-width="1" stroke-linecap="butt"/><text x="150.0" y="784" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-size="8.5" fill="#666B73" font-weight="700" text-anchor="middle" letter-spacing="1.8">REPUTATION</text><line x1="302.8571428571429" y1="766" x2="455.7142857142857" y2="766" stroke="#3C414A" stroke-width="1" stroke-linecap="butt"/><line x1="302.8571428571429" y1="762" x2="302.8571428571429" y2="770" stroke="#3C414A" stroke-width="1" stroke-linecap="butt"/><line x1="455.7142857142857" y1="762" x2="455.7142857142857" y2="770" stroke="#3C414A" stroke-width="1" stroke-linecap="butt"/><text x="379.28571428571433" y="784" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-size="8.5" fill="#666B73" font-weight="700" text-anchor="middle" letter-spacing="1.8">FIRST CONTACT</text><line x1="608.5714285714286" y1="766" x2="914.2857142857143" y2="766" stroke="#3C414A" stroke-width="1" stroke-linecap="butt"/><line x1="608.5714285714286" y1="762" x2="608.5714285714286" y2="770" stroke="#3C414A" stroke-width="1" stroke-linecap="butt"/><line x1="914.2857142857143" y1="762" x2="914.2857142857143" y2="770" stroke="#3C414A" stroke-width="1" stroke-linecap="butt"/><text x="761.4285714285714" y="784" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-size="8.5" fill="#666B73" font-weight="700" text-anchor="middle" letter-spacing="1.8">DISORIENTATION → EXIT</text><line x1="1067.142857142857" y1="766" x2="1220.0" y2="766" stroke="#3C414A" stroke-width="1" stroke-linecap="butt"/><line x1="1067.142857142857" y1="762" x2="1067.142857142857" y2="770" stroke="#3C414A" stroke-width="1" stroke-linecap="butt"/><line x1="1220.0" y1="762" x2="1220.0" y2="770" stroke="#3C414A" stroke-width="1" stroke-linecap="butt"/><text x="1143.5714285714284" y="784" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-size="8.5" fill="#666B73" font-weight="700" text-anchor="middle" letter-spacing="1.8">COLLAPSE</text></g><g id="decline_path"><line x1="150.0" y1="380.0" x2="302.8571428571429" y2="400.5913082866727" stroke="#4E5C70" stroke-width="1.6" stroke-linecap="round" opacity="0.82"/><line x1="302.8571428571429" y1="400.5913082866727" x2="455.7142857142857" y2="436.25711211767054" stroke="#4E5C70" stroke-width="1.6" stroke-linecap="round" opacity="0.82"/><line x1="455.7142857142857" y1="436.25711211767054" x2="608.5714285714286" y2="481.27675089860713" stroke="#4E5C70" stroke-width="1.6" stroke-linecap="round" opacity="0.82"/><line x1="608.5714285714286" y1="481.27675089860713" x2="761.4285714285714" y2="533.698959762967" stroke="#4E5C70" stroke-width="1.6" stroke-linecap="round" opacity="0.82"/><line x1="761.4285714285714" y1="533.698959762967" x2="914.2857142857143" y2="592.4175752530432" stroke="#4E5C70" stroke-width="1.6" stroke-linecap="round" opacity="0.82"/><line x1="914.2857142857143" y1="592.4175752530432" x2="1067.142857142857" y2="656.6962376015686" stroke="#4E5C70" stroke-width="1.6" stroke-linecap="round" opacity="0.82"/><line x1="1067.142857142857" y1="656.6962376015686" x2="1220.0" y2="726.0" stroke="#EA7600" stroke-width="2.4" stroke-linecap="round" opacity="1"/></g><g id="node_dot_01"><circle cx="150.0" cy="380.0" r="6.5" fill="#050505" stroke="#90959C" stroke-width="1.8"/></g><g id="node_dot_02"><circle cx="302.8571428571429" cy="400.5913082866727" r="6.5" fill="#050505" stroke="#90959C" stroke-width="1.8"/></g><g id="node_dot_03"><circle cx="455.7142857142857" cy="436.25711211767054" r="6.5" fill="#050505" stroke="#90959C" stroke-width="1.8"/></g><g id="node_dot_04"><circle cx="608.5714285714286" cy="481.27675089860713" r="6.5" fill="#050505" stroke="#90959C" stroke-width="1.8"/></g><g id="node_dot_05"><circle cx="761.4285714285714" cy="533.698959762967" r="6.5" fill="#050505" stroke="#90959C" stroke-width="1.8"/></g><g id="node_dot_06"><circle cx="914.2857142857143" cy="592.4175752530432" r="6.5" fill="#050505" stroke="#90959C" stroke-width="1.8"/></g><g id="node_dot_07"><circle cx="1067.142857142857" cy="656.6962376015686" r="6.5" fill="#050505" stroke="#90959C" stroke-width="1.8"/></g><g id="node_dot_08"><circle cx="1220.0" cy="726.0" r="6.5" fill="#050505" stroke="#EA7600" stroke-width="1.8"/><circle cx="1220.0" cy="726.0" r="2.4" fill="#EA7600"/><line x1="1210.0" y1="739.0" x2="1230.0" y2="739.0" stroke="#EA7600" stroke-width="1.5" stroke-linecap="butt"/></g><line x1="150.0" y1="387.0" x2="150.0" y2="400.0" stroke="#2A2D33" stroke-width="1" stroke-linecap="butt"/><g id="node_card_01"><text x="81.0" y="415.0" font-family="Newsreader, 'Times New Roman', Georgia, serif" font-size="12.5" fill="#90959C" font-weight="500">01</text><text x="105.0" y="415.0" font-family="Newsreader, 'Times New Roman', Georgia, serif" font-size="13" fill="#F4F1E9" font-weight="500">Pre-open reputation</text><text x="81.0" y="432.0" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#90959C"><tspan x="81.0" dy="0">“Blender is hard” arrives</tspan><tspan x="81.0" dy="13.5">before the first click.</tspan></text></g><line x1="302.8571428571429" y1="407.5913082866727" x2="302.8571428571429" y2="420.5913082866727" stroke="#2A2D33" stroke-width="1" stroke-linecap="butt"/><g id="node_card_02"><text x="233.8571428571429" y="435.5913082866727" font-family="Newsreader, 'Times New Roman', Georgia, serif" font-size="12.5" fill="#90959C" font-weight="500">02</text><text x="257.8571428571429" y="435.5913082866727" font-family="Newsreader, 'Times New Roman', Georgia, serif" font-size="13" fill="#F4F1E9" font-weight="500">First-open overwhelm</text><text x="233.8571428571429" y="452.5913082866727" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#90959C"><tspan x="233.8571428571429" dy="0">A dense interface with no</tspan><tspan x="233.8571428571429" dy="13.5">obvious entry point.</tspan></text></g><line x1="455.7142857142857" y1="443.25711211767054" x2="455.7142857142857" y2="456.25711211767054" stroke="#2A2D33" stroke-width="1" stroke-linecap="butt"/><g id="node_card_03"><text x="386.7142857142857" y="471.25711211767054" font-family="Newsreader, 'Times New Roman', Georgia, serif" font-size="12.5" fill="#90959C" font-weight="500">03</text><text x="410.7142857142857" y="471.25711211767054" font-family="Newsreader, 'Times New Roman', Georgia, serif" font-size="13" fill="#F4F1E9" font-weight="500">No readable state</text><text x="386.7142857142857" y="488.25711211767054" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#90959C"><tspan x="386.7142857142857" dy="0">Mode, selection, and</tspan><tspan x="386.7142857142857" dy="13.5">context stay invisible.</tspan></text></g><line x1="608.5714285714286" y1="474.27675089860713" x2="608.5714285714286" y2="453.27675089860713" stroke="#2A2D33" stroke-width="1" stroke-linecap="butt"/><g id="node_card_04"><text x="539.5714285714286" y="420.27675089860713" font-family="Newsreader, 'Times New Roman', Georgia, serif" font-size="12.5" fill="#90959C" font-weight="500">04</text><text x="563.5714285714286" y="420.27675089860713" font-family="Newsreader, 'Times New Roman', Georgia, serif" font-size="13" fill="#F4F1E9" font-weight="500">Spatial disorientation</text><text x="539.5714285714286" y="437.27675089860713" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#90959C"><tspan x="539.5714285714286" dy="0">One navigation slip erases</tspan><tspan x="539.5714285714286" dy="13.5">every landmark.</tspan></text></g><line x1="761.4285714285714" y1="540.698959762967" x2="761.4285714285714" y2="561.698959762967" stroke="#2A2D33" stroke-width="1" stroke-linecap="butt"/><g id="node_card_05"><text x="692.4285714285714" y="576.698959762967" font-family="Newsreader, 'Times New Roman', Georgia, serif" font-size="12.5" fill="#90959C" font-weight="500">05</text><text x="716.4285714285714" y="576.698959762967" font-family="Newsreader, 'Times New Roman', Georgia, serif" font-size="13" fill="#F4F1E9" font-weight="500">External help-seeking</text><text x="692.4285714285714" y="593.698959762967" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#90959C"><tspan x="692.4285714285714" dy="0">Leaves the app; rebuilds</tspan><tspan x="692.4285714285714" dy="13.5">onboarding from video.</tspan></text></g><line x1="914.2857142857143" y1="585.4175752530432" x2="914.2857142857143" y2="564.4175752530432" stroke="#2A2D33" stroke-width="1" stroke-linecap="butt"/><g id="node_card_06"><text x="845.2857142857143" y="531.4175752530432" font-family="Newsreader, 'Times New Roman', Georgia, serif" font-size="12.5" fill="#90959C" font-weight="500">06</text><text x="869.2857142857143" y="531.4175752530432" font-family="Newsreader, 'Times New Roman', Georgia, serif" font-size="13" fill="#F4F1E9" font-weight="500">Tutorial mismatch</text><text x="845.2857142857143" y="548.4175752530432" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#90959C"><tspan x="845.2857142857143" dy="0">Tutorial UI ≠ their</tspan><tspan x="845.2857142857143" dy="13.5">screen; steps don’t</tspan><tspan x="845.2857142857143" dy="13.5">transfer.</tspan></text></g><line x1="1067.142857142857" y1="649.6962376015686" x2="1067.142857142857" y2="628.6962376015686" stroke="#2A2D33" stroke-width="1" stroke-linecap="butt"/><g id="node_card_07"><text x="998.1428571428571" y="595.6962376015686" font-family="Newsreader, 'Times New Roman', Georgia, serif" font-size="12.5" fill="#90959C" font-weight="500">07</text><text x="1022.1428571428571" y="595.6962376015686" font-family="Newsreader, 'Times New Roman', Georgia, serif" font-size="13" fill="#F4F1E9" font-weight="500">No first win</text><text x="998.1428571428571" y="612.6962376015686" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#90959C"><tspan x="998.1428571428571" dy="0">No object, no proof, no</tspan><tspan x="998.1428571428571" dy="13.5">reason to continue.</tspan></text></g><g id="node_card_08"><text x="1236" y="696.0" font-family="Newsreader, 'Times New Roman', Georgia, serif" font-size="12.5" fill="#EA7600" font-weight="500">08</text><text x="1260" y="696.0" font-family="Newsreader, 'Times New Roman', Georgia, serif" font-size="13.5" fill="#EA7600" font-weight="500">Abandonment</text><text x="1236" y="714.0" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#90959C"><tspan x="1236" dy="0">Session one ends with</tspan><tspan x="1236" dy="13.5">nothing to return to.</tspan></text><line x1="1229.0" y1="726.0" x2="1230" y2="726.0" stroke="#2A2D33" stroke-width="1" stroke-linecap="butt"/></g><line x1="96" y1="904" x2="1344" y2="904" stroke="#202227" stroke-width="1" stroke-linecap="butt"/><text x="96" y="886" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#EA7600" font-weight="700" letter-spacing="3">READ THE SLOPE</text><text x="272" y="882" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-size="12.5" fill="#90959C"><tspan x="272" dy="0">The curve never spikes on difficulty — it bleeds out on ambiguity. Every node is a missing signal, not a missing capability. Restore the signals and the slope</tspan><tspan x="272" dy="17">flattens.</tspan></text></g>
</svg>
